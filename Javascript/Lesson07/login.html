<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        body {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 100px;
}
form {
  display: flex;
  flex-direction: column;
  width: 30%;
  padding: 20px;
  gap: 10px;
  box-shadow: rgba(100, 100, 111, 0.2) 0px 7px 29px 0px;
  border-radius: 5px;
}

h2 {
  margin: 0;
  text-align: center;
}

input {
  padding: 8px;
  border: 1px solid gray;
  border-radius: 5px;
}
#switcherBtn {
  background-color: white;
  border: none;
  color: blue;
}

#signBtn {
  background-color: blue;
  color: white;
  border: none;
}

.hidden {
  display: none;
}
    </style>
  </head>
  <body>
    <form action="">
      <h2>Sign up</h2>
      <label id="usernameLabel" for="username">Username</label>
      <input type="text" id="username" />

      <label for="email">Email</label>
      <input type="email" id="email" />

      <label for="password">Password</label>
      <input type="password" id="password" />

      <input id="signBtn" type="button" value="Sign up" />
      <input id="switcherBtn" type="button" value="Already have an account? Login" />
    </form>
    <script src="/Javascript/Lesson07/login.js"></script>
  </body>
</html>
