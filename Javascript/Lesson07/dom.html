<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Friendly To-Do List</title>
    <style>
        body {
    background-color: #888;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    padding-top: 50px;
}

.mainAppCard {
    background: white;
    width: 450px;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

/* Individual human task box */
.singleTaskCard {
    border: 1px solid #eee;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 20px;
    text-align: left;
    position: relative;
}

.statusLabel {
    position: absolute;
    top: 15px;
    right: 15px;
    padding: 4px 10px;
    border-radius: 6px;
    color: white;
    font-size: 12px;
    font-weight: bold;
}

/* Status colors using human names */
.pending { background: #ffa500; }
.inProgress { background: #0000ff; }
.completed { background: #28a745; }

.removeBtn {
    background: #ff0000;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 10px;
}

.actionBtn {
    background: #007bff;
    color: white;
    border: none;
    width: 100%;
    padding: 15px;
    border-radius: 8px;
    cursor: pointer;
}

/* Popup specific styling */
.hiddenOverlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

.popupContentBox {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.confirmBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; }
.cancelBtn { background: #ff0000; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="mainAppCard">
        <h1>My Tasks</h1>
        
        <div id="theTaskList"></div>

        <button id="openPopupButton" class="actionBtn">Add Task</button>
    </div>

    <div id="thePopupOverlay" class="hiddenOverlay">
        <div class="popupContentBox">
            <h2>New Task</h2>
            <input type="text" id="userInputTitle" placeholder="Task Title">
            <textarea id="userInputNote" placeholder="Task Description" rows="3"></textarea>
            
            <select id="userSelectedStatus">
                <option value="pending">Pending</option>
                <option value="inProgress">In Progress</option>
                <option value="completed">Completed</option>
            </select>

            <button id="saveTaskButton" class="confirmBtn">Save Task</button>
            <button id="closePopupButton" class="cancelBtn">Close</button>
        </div>
    </div>

    <script src="/Javascript/Lesson07/dom.js"></script>
</body>
</html>
