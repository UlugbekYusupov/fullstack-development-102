<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive To-Do List</title>
    <style>
        * {
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    padding: 50px;
}

.todo-container {
    background: white;
    width: 450px;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-align: center;
}

h1 { font-size: 24px; margin-bottom: 20px; }

/* Task Card Styling */
.task-card {
    background: #fff;
    border: 1px solid #eee;
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 15px;
    text-align: left;
    position: relative;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.task-card h3 { margin: 0 0 5px 0; font-size: 18px; }
.task-card p { margin: 0; color: #666; font-size: 14px; }

.status-badge {
    position: absolute;
    top: 15px;
    right: 15px;
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 12px;
    color: white;
    font-weight: bold;
    text-transform: lowercase;
}

/* Badge Colors */
.status-pending { background-color: #ffa500; }
.status-in-progress { background-color: #0000ff; }
.status-completed { background-color: #28a745; }

.btn-delete {
    background: #ff0000;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 10px;
}

.btn-add-main {
    background: #007bff;
    color: white;
    border: none;
    width: 100%;
    padding: 12px;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

/* Modal Styling */
.overlay {
    display: none; /* Hidden by default */
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

.modal {
    background: white;
    padding: 25px;
    border-radius: 10px;
    width: 350px;
    text-align: center;
}

.modal input, .modal textarea, .modal select {
    width: 100%;
    margin-bottom: 15px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

.btn-save {
    background: #007bff;
    color: white;
    border: none;
    width: 100%;
    padding: 12px;
    border-radius: 5px;
    margin-bottom: 10px;
    cursor: pointer;
}

.btn-close {
    background: #ff0000;
    color: white;
    border: none;
    width: 100%;
    padding: 12px;
    border-radius: 5px;
    cursor: pointer;
}
    </style>
</head>
<body>

    <div class="todo-container">
        <h1>Interactive To-Do List</h1>
        
        <div id="task-list">
            </div>

        <button id="open-modal-btn" class="btn-add-main">Add Task</button>
    </div>

    <div id="modal-overlay" class="overlay">
        <div class="modal">
            <h2>Add Task</h2>
            <input type="text" id="task-title" placeholder="Task Title">
            <textarea id="task-desc" placeholder="Task Description" rows="3"></textarea>
            
            <select id="task-status">
                <option value="pending">Pending</option>
                <option value="in progress">In Progress</option>
                <option value="completed">Completed</option>
            </select>

            <button id="save-task-btn" class="btn-save">Save Task</button>
            <button id="close-modal-btn" class="btn-close">Close</button>
        </div>
    </div>

    <script src="/Javascript/Lesson07/dom.js"></script>
</body>
</html>
