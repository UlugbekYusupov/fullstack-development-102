<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
   
</head>
<body>

    <style>
        h1{
            font-size: medium;
            color: #333;
        }
        .container{
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        input[type="password"]{
            width: 80%;
            padding: 10px;
            margin-top: 10px;
            border: 2px solid #ccc; 
            border-radius: 5px;
        }
        input[type="password"]:focus{
            border-color: #007BFF;
            outline: none;
        }



        #strength{
            color: white;
            margin-top: 10px;
            padding: 10px;
            font-weight: bold;
            border-radius: 7px;
            width: 30%;
            
        }
    </style>
   <div class="container">
    <h1> Password Strength Checker</h1>
    <input type="password" id="password" placeholder="Enter password">
    <div id="strength"></div>
   </div>
    
</body>
<script src="dom.js" defer></script>
</html>
