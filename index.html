    <script>

            console.log("5" * "2"); //10    
            console.log("10" / 2); //5

            totalBudget = Number(totalBudget);

            const expense2 = Number(prompt("Enter expense 2:"));
            const expense3 = Number(prompt("Enter expense 3:"));
            const totalExpenses = expense1 + expense2 + expense3;
            const remaining = totalBudget - totalExpenses;
            console.log("Total budget :",totalBudget)
            console.log("you spent",expense1 , "first time")

    </script>
    <script>
        let isActive = false;

        document.addEventListener("keydown", (e) => {
            if (e.ctrlKey && e.altKey && e.key === "i") {
                isActive = true;
                updateStatus();
            }

            if (e.ctrlKey && e.altKey && e.key === "o") {
                isActive = false;
                updateStatus();
            }
        });
        function updateStatus() {
            const status = document.getElementById("status");
            if (isActive) {
                status.classList.add("active");
                status.classList.remove("inactive");
            } else {
                status.classList.add("inactive");
                status.classList.remove("active");
            }
        }
    </script>
    <script>
    function renew() {
        document.body.innerHTML = '';
        document.body.style.display = 'flex';
        document.body.style.justifyContent = 'center';
        document.body.style.alignItems = 'center';
        document.body.style.height = '100vh';
        document.body.style.cursor = 'pointer'; 

        const sequence = ["YOU", "CLICKED", "ME"];
        let currentIndex = 0;

        const displayElement = document.createElement('h1');
        displayElement.textContent = 'WHY?';
        
        const applyStyle = (el) => {
            el.style.fontSize = '5rem';
            el.style.letterSpacing = '15px';
            el.style.color = 'white';
            el.style.fontWeight = 'bold';
            el.style.textTransform = 'uppercase';
            el.style.userSelect = 'none';
            el.style.transition = 'transform 0.1s ease';
        };
        applyStyle(displayElement);

        displayElement.addEventListener('click', () => {
            if (currentIndex < sequence.length) {
                displayElement.textContent = sequence[currentIndex];
                currentIndex++;
                
                displayElement.style.transform = 'scale(1.1)';
                setTimeout(() => displayElement.style.transform = 'scale(1)', 100);
            } else {
                displayElement.style.opacity = '0.2';
                displayElement.textContent = "...";
            }
        });

        document.body.appendChild(displayElement);
    }
    </script>
    <script type="module" src="app.js"></script>
    <script src="sw.js"></script></body>
