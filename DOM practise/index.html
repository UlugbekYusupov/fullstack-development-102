<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Favourite Movie Franchise</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            font-family: Arial, sans-serif;
        }

        .card {
            width: 400px;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ccc;
            text-align: center;
            background-color: transparent;
        }

        .card h1 {
            color: #fff;
            margin-bottom: 20px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item {
            background-color: #ddd;
            padding: 12px;
            margin: 5px 0;
            border-radius: 5px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="main-heading">Favourite Movie Franchise</h1>
        <ul>
            <li class="list-items">The Matrix</li>
            <li class="list-items">Star Wars</li>
            <li class="list-items">Harry Potter</li>
            <li class="list-items">Lord of the Rings</li>
            <li class="list-items">Marvel</li>
        </ul>
    </div>
    <script src="./app.js"></script>
</body>
</html>
